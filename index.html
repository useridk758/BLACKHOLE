<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole Browser</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* UI Layer */
        .interface {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            transition: opacity 0.5s;
        }

        .title {
            position: absolute;
            top: 10%;
            color: #fff;
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-transform: uppercase;
        }

        .search-container { width: 90%; max-width: 550px; }

        input {
            width: 100%;
            padding: 18px 30px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            backdrop-filter: blur(12px);
            text-align: center;
        }

        /* The "Browser" Frame */
        #content-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none; /* Hidden until search */
            z-index: 20;
            background: white;
        }

        /* Back Button to return to Blackhole */
        #back-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 30;
            display: none;
            padding: 10px 20px;
            background: #fff;
            color: #000;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <div class="interface" id="ui">
        <h1 class="title">BLACKHOLE</h1>
        <form class="search-container" id="search-form">
            <input type="text" id="url-input" placeholder="Enter URL (e.g., https://example.com)" autocomplete="off">
        </form>
    </div>

    <button id="back-btn">Close Page</button>
    <iframe id="content-frame"></iframe>
    <canvas id="blackholeCanvas"></canvas>

    <script>
        // --- Canvas Animation ---
        const canvas = document.getElementById('blackholeCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, stars = [];

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 400; i++) {
                stars.push({
                    dist: Math.random() * Math.max(w, h),
                    angle: Math.random() * Math.PI * 2,
                    speed: 0.005 + Math.random() * 0.01
                });
            }
        }

        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, w, h);
            stars.forEach(s => {
                s.angle += s.speed;
                s.dist -= 0.5;
                if(s.dist < 20) s.dist = Math.max(w, h);
                const x = w/2 + Math.cos(s.angle) * s.dist;
                const y = h/2 + Math.sin(s.angle) * s.dist * 0.6;
                ctx.fillStyle = '#fff';
                ctx.fillRect(x, y, 2, 2);
            });
            requestAnimationFrame(draw);
        }

        // --- Logic to open URL in Frame ---
        const form = document.getElementById('search-form');
        const input = document.getElementById('url-input');
        const frame = document.getElementById('content-frame');
        const ui = document.getElementById('ui');
        const backBtn = document.getElementById('back-btn');

        form.onsubmit = (e) => {
            e.preventDefault();
            let url = input.value.trim();
            
            // Basic URL formatting
            if (!url.startsWith('http')) url = 'https://' + url;

            // Show frame, hide UI
            frame.src = url;
            frame.style.display = 'block';
            ui.style.opacity = '0';
            backBtn.style.display = 'block';
        };

        backBtn.onclick = () => {
            frame.style.display = 'none';
            frame.src = '';
            ui.style.opacity = '1';
            backBtn.style.display = 'none';
        };

        window.addEventListener('resize', init);
        init(); draw();
    </script>
</body>
</html>
