<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole Popcorn Browser</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* TOP MIDDLE TEXT - ULTRA BOLD */
        .title {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            color: #ffffff;
            font-size: 5.5rem;
            font-weight: 900; 
            letter-spacing: 25px;
            margin: 0;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* MIDDLE SEARCH BAR */
        .search-container { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; 
            max-width: 550px; 
            z-index: 20;
        }

        input {
            width: 100%;
            padding: 22px 35px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 60px;
            color: white;
            font-size: 1.3rem;
            outline: none;
            backdrop-filter: blur(20px);
            text-align: center;
        }

        /* BROWSER OVERLAY */
        #browser-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: none; /* Hidden by default */
            background: black;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* EXIT BUTTON - Visible over the iframe */
        #exit-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 15px 30px;
            background: #ff4400;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            cursor: pointer;
            z-index: 101;
            box-shadow: 0 0 20px rgba(255, 68, 0, 0.5);
            text-transform: uppercase;
        }

        #exit-btn:hover { background: #ff6622; }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

    <h1 class="title">BLACKHOLE</h1>

    <div class="search-container" id="ui-main">
        <form id="search-form">
            <input type="text" id="url-input" placeholder="Enter URL to feed the void..." autocomplete="off">
        </form>
    </div>

    <!-- The Proxy/Browser View -->
    <div id="browser-overlay">
        <button id="exit-btn">Exit Void</button>
        <iframe id="content-frame"></iframe>
    </div>

    <canvas id="bhCanvas"></canvas>

    <script>
        const canvas = document.getElementById('bhCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, popcorns = [];

        // Black Hole on the LEFT
        const bhPos = { x: 0.2, y: 0.5 }; 
        const eventHorizonRadius = 130; 

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            popcorns = [];
            for(let i=0; i<100; i++) popcorns.push(new Popcorn());
        }

        class Popcorn {
            constructor() { this.reset(true); }
            reset(initial = false) {
                // Spawn mostly from the right/top/bottom to get pulled left
                this.x = initial ? Math.random() * w : w + 50;
                this.y = Math.random() * h;
                this.size = Math.random() * 7 + 3;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.1 - 0.05;
                this.speed = Math.random() * 2 + 1;
            }
            update() {
                const tx = w * bhPos.x;
                const ty = h * bhPos.y;
                const dx = tx - this.x;
                const dy = ty - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                // Stronger vortex pull
                const pull = 4000 / (dist + 50);
                const angleToHole = Math.atan2(dy, dx);
                
                // Spiral motion: move toward center + slight tangent
                this.x += Math.cos(angleToHole + 0.4) * pull;
                this.y += Math.sin(angleToHole + 0.4) * pull;
                this.angle += this.spin;

                if (dist < 90) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.fillStyle = "#FFFDE7";
                // Kernel shape
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI*2);
                ctx.arc(this.size/2, this.size/2, this.size/1.5, 0, Math.PI*2);
                ctx.fill();
                ctx.restore();
            }
        }

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);

            const cx = w * bhPos.x;
            const cy = h * bhPos.y;

            // Accretion Disk (Glow)
            const g = ctx.createRadialGradient(cx, cy, eventHorizonRadius, cx, cy, 500);
            g.addColorStop(0, '#ffaa00');
            g.addColorStop(0.2, '#ff4400');
            g.addColorStop(0.5, 'rgba(50, 0, 0, 0.3)');
            g.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, w, h);

            popcorns.forEach(p => { p.update(); p.draw(); });

            // The Hole
            ctx.beginPath();
            ctx.arc(cx, cy, eventHorizonRadius, 0, Math.PI * 2);
            ctx.fillStyle = "black";
            ctx.shadowBlur = 100;
            ctx.shadowColor = "white";
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        // Logic
        const form = document.getElementById('search-form');
        const overlay = document.getElementById('browser-overlay');
        const frame = document.getElementById('content-frame');
        const exitBtn = document.getElementById('exit-btn');

        form.onsubmit = (e) => {
            e.preventDefault();
            let url = document.getElementById('url-input').value.trim();
            if (!url.startsWith('http')) url = 'https://' + url;
            frame.src = url;
            overlay.style.display = 'block';
        };

        exitBtn.onclick = () => {
            overlay.style.display = 'none';
            frame.src = ''; // Stop the site from running in background
        };

        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
