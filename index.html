<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackhole Popcorn</title>
    <style>
        @import url('https://fonts.googleapis.com');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        /* 1. TOP MIDDLE TEXT - ULTRA BOLD */
        .title {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 15;
            color: #ffffff;
            font-size: 5.5rem;
            font-weight: 900; /* Max Boldness */
            letter-spacing: 25px;
            margin: 0;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        /* 2. MIDDLE SEARCH BAR */
        .search-container { 
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; 
            max-width: 550px; 
            z-index: 20;
        }

        input {
            width: 100%;
            padding: 22px 35px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid rgba(255, 255, 255, 0.4);
            border-radius: 60px;
            color: white;
            font-size: 1.3rem;
            outline: none;
            backdrop-filter: blur(20px);
            text-align: center;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffcc00;
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.4);
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        iframe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            border: none; display: none; z-index: 100; background: white;
        }
    </style>
</head>
<body>

    <h1 class="title">BLACKHOLE</h1>

    <div class="search-container">
        <form id="search-form">
            <input type="text" id="url-input" placeholder="Enter URL to feed the void..." autocomplete="off">
        </form>
    </div>

    <iframe id="content-frame"></iframe>
    <canvas id="bhCanvas"></canvas>

    <script>
        const canvas = document.getElementById('bhCanvas');
        const ctx = canvas.getContext('2d');
        let w, h, popcorns = [];

        // BLACK HOLE CONFIG (Shifted Left)
        const bhPos = { x: 0.25, y: 0.5 }; // 25% from left, 50% from top
        const eventHorizonRadius = 110; 

        function init() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            popcorns = [];
            for(let i=0; i<80; i++) popcorns.push(new Popcorn());
        }

        class Popcorn {
            constructor() { this.reset(); }
            reset() {
                // Random start position around the edges
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                // Random size and "popcorn" fluffiness
                this.size = Math.random() * 6 + 4;
                this.angle = Math.random() * Math.PI * 2;
                this.v = Math.random() * 2 + 1; // Velocity
            }
            update() {
                const targetX = w * bhPos.x;
                const targetY = h * bhPos.y;
                const dx = targetX - this.x;
                const dy = targetY - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                // Gravitational pull + Swirl logic
                const force = 3000 / (dist + 100);
                const angleToCenter = Math.atan2(dy, dx);
                
                // Moves toward center but with a slight spiral (adding 0.5 to angle)
                this.x += Math.cos(angleToCenter + 0.3) * force;
                this.y += Math.sin(angleToCenter + 0.3) * force;

                // If sucked in, reset to edge
                if (dist < 80) this.reset();
            }
            draw() {
                ctx.fillStyle = "#FFFDE7";
                ctx.beginPath();
                // Drawing a "clump" of 3 dots to look like popcorn
                ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2);
                ctx.arc(this.x+2, this.y+2, this.size/2, 0, Math.PI*2);
                ctx.arc(this.x-2, this.y+1, this.size/2.5, 0, Math.PI*2);
                ctx.fill();
            }
        }

        function animate() {
            // Background Clear
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, w, h);

            const cx = w * bhPos.x;
            const cy = h * bhPos.y;

            // 1. Draw Accretion Disk (The Orange Glow)
            const g = ctx.createRadialGradient(cx, cy, eventHorizonRadius, cx, cy, 400);
            g.addColorStop(0, 'rgba(255, 120, 0, 1)');
            g.addColorStop(0.3, 'rgba(255, 50, 0, 0.4)');
            g.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, w, h);

            // 2. Draw Popcorn
            popcorns.forEach(p => { p.update(); p.draw(); });

            // 3. Draw The Actual Black Hole (The Void)
            ctx.beginPath();
            ctx.arc(cx, cy, eventHorizonRadius, 0, Math.PI * 2);
            ctx.fillStyle = "black";
            ctx.shadowBlur = 80;
            ctx.shadowColor = "white";
            ctx.fill();
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        // URL Form Logic
        document.getElementById('search-form').onsubmit = (e) => {
            e.preventDefault();
            let url = document.getElementById('url-input').value.trim();
            if (!url.startsWith('http')) url = 'https://' + url;
            const frame = document.getElementById('content-frame');
            frame.src = url;
            frame.style.display = 'block';
        };

        window.addEventListener('resize', init);
        init(); animate();
    </script>
</body>
</html>
